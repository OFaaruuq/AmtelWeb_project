<div class="container-fluid bg-dark text-light footer my-6 mb-0 py-6 wow fadeIn" data-wow-delay="0.1s">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-3 col-md-6">
                <img src="/img/amtelogo.png" alt="AMTEL Ltd Logo" class="amtel-logo">
                <p class="mb-2"><i class="fa fa-map-marker-alt me-3"></i>{{ site.address }}</p>
                <p class="mb-2"><i class="fa fa-phone-alt me-3"></i>{{ site.phone }}</p>
                <p class="mb-2"><i class="fa fa-envelope me-3"></i>{{ site.email }}</p>
            </div>
            <div class="col-lg-3 col-md-6">
                <h4 class="text-light mb-4">Quick Links</h4>
                <a class="btn btn-link" href="/#about-section">About Us</a>
                <a class="btn btn-link" href="{{ url_for('contact') }}">Contact Us</a>
                <a class="btn btn-link" href="/#personal-products">Our Services</a>
                <a class="btn btn-link" href="/#pricing">Pricing Plans</a>
                <a class="btn btn-link" href="{{ url_for('contact') }}">Support</a>
            </div>
            <div class="col-lg-3 col-md-6">
                <h4 class="text-light mb-4">Popular Links</h4>
                <a class="btn btn-link" href="/#about-section">About Us</a>
                <a class="btn btn-link" href="/#mycash-section">MyCash</a>
                <a class="btn btn-link" href="/#business-products">Business Products</a>
                <a class="btn btn-link" href="{{ url_for('mysms') }}">My SMS API</a>
                <a class="btn btn-link" href="/#personal-products">Personal Products</a>
                <a class="btn btn-link" href="{{ url_for('contact') }}">Get In Touch</a>
            </div>
            <div class="col-lg-3 col-md-6">
                <h4 class="text-light mb-4">Newsletter</h4>
                <form action="{{ url_for('newsletter') }}" method="post">
                    <div class="input-group">
                        <input type="email" class="form-control p-3 border-0" name="email" placeholder="Your Email Address" required>
                        <button class="btn btn-primary" type="submit">Sign Up</button>
                    </div>
                </form>
                <h6 class="text-white mt-4 mb-3">Follow Us</h6>
                <div class="d-flex pt-2">
                    <a class="btn btn-square btn-outline-light me-1" href="https://twitter.com/amtelkom" target="_blank" rel="noopener noreferrer" aria-label="AMTEL Twitter"><i class="fab fa-twitter"></i></a>
                    <a class="btn btn-square btn-outline-light me-1" href="https://www.facebook.com/Amtelkom?locale=en_GB" target="_blank" rel="noopener noreferrer" aria-label="AMTEL Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a class="btn btn-square btn-outline-light me-1" href="https://www.youtube.com/@amtelkom" target="_blank" rel="noopener noreferrer" aria-label="AMTEL YouTube"><i class="fab fa-youtube"></i></a>
                    <a class="btn btn-square btn-outline-light me-0" href="https://www.linkedin.com/company/amtelkom/posts/?feedView=all" target="_blank" rel="noopener noreferrer" aria-label="AMTEL LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>

</div>
