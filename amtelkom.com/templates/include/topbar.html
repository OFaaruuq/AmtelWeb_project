<div class="container-fluid p-0 bg-amtel-red">
    <div class="row gx-0 d-none d-lg-flex">
        <div class="col-lg-7 px-5 text-start">
            <div class="h-100 d-inline-flex align-items-center me-4">
                <small class="fa fa-map-marker-alt text-white me-2"></small>
                <small class="text-white">{{ site.address }}</small>
            </div>
            <div class="h-100 d-inline-flex align-items-center">
                <small class="far fa-clock text-white me-2"></small>
                <small class="text-white">{{ site.hours }}</small>
            </div>
        </div>
        <div class="col-lg-5 px-5 text-end">
            <div class="h-100 d-inline-flex align-items-center me-4">
                <small class="fa fa-phone-alt text-white me-2"></small>
                <a href="tel:+252710000000" class="text-white text-decoration-none">
                    <small>{{ site.phone }}</small>
                </a>
            </div>
            <div class="h-100 d-inline-flex align-items-center mx-n2">
                <a class="btn btn-square btn-link rounded-0 border-0 border-end border-secondary" href="https://www.facebook.com/Amtelkom?locale=en_GB" target="_blank" rel="noopener noreferrer" aria-label="AMTEL Facebook"><i class="fab fa-facebook-f text-white"></i></a>
                <a class="btn btn-square btn-link rounded-0 border-0 border-end border-secondary" href="https://twitter.com/amtelkom" target="_blank" rel="noopener noreferrer" aria-label="AMTEL Twitter"><i class="fab fa-twitter text-white"></i></a>
                <a class="btn btn-square btn-link rounded-0 border-0 border-end border-secondary" href="https://www.linkedin.com/company/amtelkom/posts/?feedView=all" target="_blank" rel="noopener noreferrer" aria-label="AMTEL LinkedIn"><i class="fab fa-linkedin-in text-white"></i></a>
                <a class="btn btn-square btn-link rounded-0" href="https://www.instagram.com/amtelkom" target="_blank" rel="noopener noreferrer" aria-label="AMTEL Instagram"><i class="fab fa-instagram text-white"></i></a>
            </div>
        </div>
    </div>
</div>
